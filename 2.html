<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Me with chill man</title>
  <style>
    #message {
      display: none;
      font-size: 24px;
      color: red;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <button onclick="showMessage()">Click Me</button>

  <div id="message">chill man </div>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
